<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="utf-8">
  <title> Трансформация и анимация</title>
  <link rel="stylesheet" href="./css/styles.css">
  <script src="http://d3js.org/d3.v7.min.js"></script>
  <script src="js/image.js" type="module"></script>
  <script src="js/main.js" type="module"></script>
</head>

<body>

  <form id="setting">
    <p>Координаты рисунка<br>
      <label for="cx">x: </label>
      <input type="number" id="cx" value="300" max="600" min="0"><br>
      <label for="cy">y: </label>
      <input type="number" id="cy" value="300" max="600" min="0">
    </p>

    <p>Масштаб<br>
      <label for="scale-x">x: </label>
      <input type="number" id="scale-x" value="1" max="10" min="1"><br>
      <label for="scale-y">y: </label>
      <input type="number" id="scale-y" value="1" max="10" min="1">
    </p>

    <p>Поворот<br>
      <input type="number" id="angle" value="0" max="360" min="0">
    </p>

    <p>Перекос<br>
      <label for="skew-x">x: </label>
      <input type="number" name="skew-x" id="skew-x" value="0">

      <label for="skew-y">y: </label>
      <input type="number" name="skew-y" id="skew-y" value="0">
    </p>

    <p>
      <input type="button" id="draw-button" value="Нарисовать">
      <input type="button" id="clear-button" value="Очистить">
    </p>
  </form>

  <svg></svg>

</body>

</html>
